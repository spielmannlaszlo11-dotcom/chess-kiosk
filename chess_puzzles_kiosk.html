<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#0A0E1A;color:#F1F5F9}
.app{max-width:540px;margin:0 auto;padding:18px 16px 24px;display:flex;flex-direction:column;min-height:100vh;justify-content:center;gap:0}

.brand{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(255,215,0,0.15)}
.brand-mark{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#FFD700 0%,#F5BB00 100%);display:flex;align-items:center;justify-content:center;font-weight:900;color:#1A1A1A;font-size:24px;box-shadow:0 2px 12px rgba(245,187,0,0.3);line-height:1}
.brand-text{flex:1;display:flex;flex-direction:column;gap:2px}
.brand-name{font-size:18px;font-weight:800;color:#FFD700;letter-spacing:0.5px;text-transform:uppercase;line-height:1}
.brand-sub{font-size:11px;color:#94A3B8;letter-spacing:1.5px;text-transform:uppercase;font-weight:500}

.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px}
.hdr-l h1{font-size:19px;font-weight:600;color:#F1F5F9;letter-spacing:-0.01em}
.hdr-l p{font-size:11px;color:#94A3B8;margin-top:2px}
.tmr{display:flex;align-items:center;gap:7px;background:#1E293B;padding:7px 12px;border-radius:10px;font-size:13px;color:#CBD5E1;font-variant-numeric:tabular-nums;font-weight:600;border:1px solid rgba(255,215,0,0.15)}
.tmr.low{background:rgba(217,119,6,0.15);color:#FBBF24;border-color:rgba(251,191,36,0.3)}
.tmr.crit{background:rgba(220,38,38,0.15);color:#F87171;border-color:rgba(248,113,113,0.3);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.6}}
.tmr-dot{width:8px;height:8px;border-radius:50%;background:currentColor}

.status{padding:12px 14px;border-radius:10px;font-size:14px;font-weight:500;text-align:center;margin-bottom:12px;min-height:42px;display:flex;align-items:center;justify-content:center;background:#1E293B;color:#CBD5E1;border:1px solid rgba(255,255,255,0.05)}
.s-ok{background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(5,150,105,0.1));color:#6EE7B7;border-color:rgba(110,231,183,0.25)}
.s-err{background:linear-gradient(135deg,rgba(239,68,68,0.15),rgba(220,38,38,0.1));color:#FCA5A5;border-color:rgba(252,165,165,0.25)}
.s-win{background:linear-gradient(135deg,#FFD700,#F59E0B);color:#1A1A1A;font-size:15px;font-weight:700;border:none;animation:pop .5s ease;box-shadow:0 4px 16px rgba(245,158,11,0.4)}
.s-hint{background:linear-gradient(135deg,rgba(168,85,247,0.15),rgba(139,92,246,0.1));color:#C4B5FD;border-color:rgba(196,181,253,0.25);font-style:italic}
@keyframes pop{0%{transform:scale(.95)}60%{transform:scale(1.04)}100%{transform:scale(1)}}

.bwrap{display:flex;justify-content:center;margin-bottom:12px}
.bcol{display:flex;flex-direction:column}
.frow{display:flex;padding-left:22px}
.frow span{width:54px;text-align:center;font-size:11px;color:#94A3B8;font-weight:500;padding:3px 0}
.brow{display:flex;align-items:flex-start}
.rks{display:flex;flex-direction:column;width:22px;flex-shrink:0}
.rks span{height:54px;display:flex;align-items:center;justify-content:flex-end;font-size:11px;color:#94A3B8;padding-right:5px;font-weight:500}
.bd{display:grid;grid-template-columns:repeat(8,54px);grid-template-rows:repeat(8,54px);border:2px solid #FFD700;border-radius:6px;overflow:hidden;flex-shrink:0;box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 0 4px rgba(255,215,0,0.1)}
.sq{width:54px;height:54px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.sq.L{background:#EEF2F7}
.sq.D{background:#7E96B8}
.sq.SEL{background:#FFD700!important}
.sq.LMF{background:#A8D479!important}
.sq.LMT{background:#7AB85C!important}
.sq.CHK{background:#E85D5D!important}
.sq.DOT::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:rgba(30,50,80,0.32);pointer-events:none;z-index:2}
.sq.CAP::after{content:'';position:absolute;inset:3px;border-radius:50%;border:3px solid rgba(30,50,80,0.32);pointer-events:none;z-index:2}
.pc{pointer-events:none;width:46px;height:46px;display:block;position:relative;z-index:3}
.pc svg{width:100%;height:100%;display:block;pointer-events:none}

.btns{display:flex;gap:8px}
.btn{flex:1;padding:13px;border-radius:10px;background:#1E293B;color:#CBD5E1;border:none;font-weight:600}
.btn.primary{background:#FFD700;color:#1A1A1A}
</style>

<div class="app">
  <div class="brand">
    <div class="brand-mark">♛</div>
    <div class="brand-text">
      <div class="brand-name">The Mate Challenge</div>
      <div class="brand-sub">Can you find it?</div>
    </div>
  </div>

  <div id="ST" class="status">Loading...</div>
  <div id="BD"></div>
</div>

<script>
document.getElementById("ST").innerText = "New version loaded successfully 🎯";
</script>

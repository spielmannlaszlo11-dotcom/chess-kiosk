<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.app{max-width:460px;margin:0 auto;padding:16px 14px 24px;font-family:var(--font-sans,sans-serif)}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px}
.hdr h1{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.tmr{display:flex;align-items:center;gap:6px;background:var(--color-background-secondary);padding:6px 10px;border-radius:8px;font-size:13px;color:var(--color-text-secondary);font-variant-numeric:tabular-nums}
.tmr.low{background:#FAEEDA;color:#633806}
.tmr.crit{background:#FCEBEB;color:#A32D2D;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.55}}
.tmr-dot{width:8px;height:8px;border-radius:50%;background:currentColor}
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tab{flex:1;padding:11px 4px;border-radius:8px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:13px;cursor:pointer;font-family:inherit;text-align:center}
.tab.on{background:#4A6FA5;color:#fff;border-color:#4A6FA5}
.status{padding:11px 14px;border-radius:8px;font-size:14px;font-weight:500;text-align:center;margin-bottom:12px;min-height:40px;display:flex;align-items:center;justify-content:center}
.s-idle{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.s-ok{background:#E1F5EE;color:#085041}
.s-err{background:#FCEBEB;color:#A32D2D}
.s-win{background:#E1F5EE;color:#085041;font-size:15px}
.s-time{background:#FAEEDA;color:#633806}
.bwrap{display:flex;justify-content:center;margin-bottom:12px}
.bcol{display:flex;flex-direction:column}
.frow{display:flex;margin-left:18px}
.frow span{width:48px;text-align:center;font-size:11px;color:var(--color-text-secondary);font-weight:500;padding:2px 0}
.brow{display:flex}
.rks{display:flex;flex-direction:column;width:18px}
.rks span{height:48px;display:flex;align-items:center;justify-content:flex-end;font-size:11px;color:var(--color-text-secondary);padding-right:3px;font-weight:500}
.bd{display:grid;grid-template-columns:repeat(8,48px);grid-template-rows:repeat(8,48px);border:1.5px solid #3E4F6B;border-radius:3px;overflow:hidden;flex-shrink:0}
.sq{width:48px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;user-select:none;-webkit-tap-highlight-color:transparent;overflow:hidden}
.sq.L{background:#EEF2F7}
.sq.D{background:#7E96B8}
.sq.SEL{background:#F9D96B !important}
.sq.LMF{background:#D4E8BC !important}
.sq.LMT{background:#A8D479 !important}
.sq.CHK{background:#E85D5D !important}
.sq.DOT::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:rgba(30,50,80,0.3);pointer-events:none;z-index:2}
.sq.CAP::after{content:'';position:absolute;inset:3px;border-radius:50%;border:3px solid rgba(30,50,80,0.3);pointer-events:none;z-index:2}
.pc{pointer-events:none;position:relative;z-index:3;width:40px;height:40px;display:block}
.pc svg{width:100%;height:100%;display:block}
@media (max-width: 440px){.bd{grid-template-columns:repeat(8,40px);grid-template-rows:repeat(8,40px)}.sq{width:40px;height:40px}.rks span{height:40px}.frow span{width:40px}.pc{width:34px;height:34px}.sq.DOT::after{width:12px;height:12px}}
@media (max-width: 380px){.bd{grid-template-columns:repeat(8,36px);grid-template-rows:repeat(8,36px)}.sq{width:36px;height:36px}.rks span{height:36px}.frow span{width:36px}.pc{width:30px;height:30px}.sq.DOT::after{width:10px;height:10px}}
.btns{display:flex;gap:8px;margin-bottom:12px}
.btn{flex:1;padding:11px 4px;border-radius:8px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;cursor:pointer;font-family:inherit;text-align:center}
.btn.primary{background:#4A6FA5;color:#fff;border-color:#4A6FA5}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.ct{display:flex;justify-content:space-between;margin-bottom:6px;gap:8px}
.cti{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.bg{font-size:11px;padding:2px 9px;border-radius:20px}
.b1{background:#E1F5EE;color:#085041}.b2{background:#E6F1FB;color:#0C447C}.b3{background:#FAEEDA;color:#633806}
.cd{font-size:13px;color:var(--color-text-secondary);line-height:1.55}
.mt{display:flex;gap:12px;font-size:12px;color:var(--color-text-tertiary);margin-top:8px}
.pg{text-align:center;font-size:12px;color:var(--color-text-tertiary);margin-top:2px}
</style>

<div class="app">
  <div class="hdr">
    <h1>Chess mate puzzles</h1>

  </div></div>
  <div class="btns">
    <button class="btn" onclick="HN()">Hint</button>
    <button class="btn" onclick="LD()">Reset</button>

    <div class="mt"><span id="PS">—</span><span id="PN">—</span></div>
  </div>
  <div class="pg" id="PR"></div>
</div>

let D=1,I=0,G=null,S=null,SV=false,LF=null,LT=null,PS=0,SL=[];
let TIMER_SEC=180, TIMER_INT=null;

function L(){return PUZ[D];}
function P(){return L()[I%L().length];}

// Square color: a1 is DARK. a1 = file 0, rank 1, sum=1.
// a8 = file 0, rank 8, sum=8 (should be LIGHT).
// So LIGHT when (file+rank) is EVEN.
function isLight(file,rank){return (file+rank)%2===0;}

function RB(){
  if(!G)return;
  const e=document.getElementById('BD');
  while(e.firstChild)e.removeChild(e.firstChild);
  const b=G.board(),t=G.turn();
  let ck=null;
  if(G.in_check()){o:for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=b[r][c];if(p&&p.type==='k'&&p.color===t){ck='abcdefgh'[c]+(8-r);break o;}}}
  const lm=new Set();
  if(S&&!SV)G.moves({square:S,verbose:true}).forEach(m=>lm.add(m.to));
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){
    const file=c,rank=8-r,sq='abcdefgh'[c]+rank,p=b[r][c];
    const v=document.createElement('div');
    let cl='sq '+(isLight(file,rank)?'L':'D');
    if(S===sq)cl+=' SEL';else if(LF===sq)cl+=' LMF';else if(LT===sq)cl+=' LMT';
    if(sq===ck)cl+=' CHK';
    if(lm.has(sq))cl+=p?' CAP':' DOT';
    v.className=cl;
    if(p){const x=document.createElement('span');x.className='pc';x.innerHTML=PSVG[p.color+p.type.toUpperCase()]||'';v.appendChild(x);}
    v.addEventListener('click',()=>CK(sq));
    e.appendChild(v);
  }
  const rk=document.getElementById('RK');rk.innerHTML='';
  for(let r=0;r<8;r++){const x=document.createElement('span');x.textContent=8-r;rk.appendChild(x);}
}

function CK(sq){
  if(!G||SV)return;
  const p=P(),pc=G.get(sq);
  if(G.turn()!==p.side)return;
  if(!S){if(pc&&pc.color===p.side){S=sq;RB();}return;}
  if(S===sq){S=null;RB();return;}
  if(pc&&pc.color===p.side){S=sq;RB();return;}
  const lg=G.moves({square:S,verbose:true});
  if(!lg.find(m=>m.to===sq)){S=null;RB();SS('err','Illegal move');return;}
  const ex=SL[PS],mv=S+sq;
  if(mv===ex||mv+'q'===ex){
    G.move({from:S,to:sq,promotion:'q'});LF=S;LT=sq;PS++;S=null;
    if(PS>=SL.length){SV=true;SS('win','Checkmate! Next puzzle coming up...');stopTimer();setTimeout(()=>{NP();startTimer();},3000);}
    else{SS('ok','Correct! Opponent replies...');RB();setTimeout(OM,650);return;}
  }else{SS('err','Not the right move — try again');S=null;}
  RB();
}

function OM(){
  if(PS>=SL.length)return;
  const m=SL[PS],f=m.slice(0,2),t=m.slice(2,4);
  G.move({from:f,to:t,promotion:'q'});LF=f;LT=t;PS++;RB();SS('idle','Your move!');
}

function SS(t,m){const e=document.getElementById('ST');e.textContent=m;e.className='status s-'+t;}
function HN(){const p=P(),f=p.sol[0];SS('idle','Hint: move from '+f.slice(0,2)+' to '+f.slice(2,4));}

function fmtTime(s){const m=Math.floor(s/60);const ss=s%60;return m+':'+(ss<10?'0':'')+ss;}

function updateTimer(){
  const t=document.getElementById('TMR');
  const txt=document.getElementById('TMT');
  txt.textContent=fmtTime(TIMER_SEC);
  t.className='tmr';
  if(TIMER_SEC<=30)t.className='tmr crit';
  else if(TIMER_SEC<=60)t.className='tmr low';
}

function startTimer(){
  stopTimer();
  TIMER_SEC=180;
  updateTimer();
  TIMER_INT=setInterval(()=>{
    TIMER_SEC--;
    updateTimer();
    if(TIMER_SEC<=0){
      stopTimer();
      SS('time','Time up! Rotating to next puzzle...');
      setTimeout(()=>{
        // Auto-rotate across all difficulties to keep kiosk fresh
        const diffs=[1,2,3];
        D=diffs[Math.floor(Math.random()*diffs.length)];
        I=Math.floor(Math.random()*L().length);
        document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',[1,2,3][j]===D));
        LD();
        startTimer();
      },2000);
    }
  },1000);
}

function stopTimer(){if(TIMER_INT){clearInterval(TIMER_INT);TIMER_INT=null;}}

function LD(){
  const p=P();
  try{
    G=new Chess(p.fen);S=null;SV=false;LF=null;LT=null;PS=0;SL=p.sol;
    document.getElementById('PT').textContent=p.title;
    document.getElementById('PD').textContent=p.desc;
    document.getElementById('PB').textContent='Mate in '+D;
    document.getElementById('PB').className='bg b'+D;
    document.getElementById('PS').textContent=p.side==='w'?'White to move':'Black to move';
    const ls=L();
    document.getElementById('PR').textContent='Puzzle '+(I%ls.length+1)+' of '+ls.length;
    document.getElementById('PN').textContent='';
    RB();
    SS('idle',p.side==='w'?'White to move — find mate in '+D:'Black to move — find mate in '+D);
  }catch(e){SS('err','Error');console.error(e);}
}

function SD(n){D=n;I=0;document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',[1,2,3][j]===n));LD();startTimer();}
function NP(){I=(I+1)%L().length;LD();startTimer();}

const fr=document.getElementById('FR');
'abcdefgh'.split('').forEach(f=>{const x=document.createElement('span');x.textContent=f;fr.appendChild(x);});

function IN(){if(typeof Chess!=='undefined'){LD();startTimer();}else setTimeout(IN,60);}
IN();
</script>
